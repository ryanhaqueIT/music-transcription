name: Carol of Bells Audiveris

on:
  workflow_dispatch:
  push:
    paths:
      - 'test-scores/carol-of-the-bells-viola.pdf'

jobs:
  audiveris:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Audiveris
        run: |
          curl -L -o /tmp/audiveris.deb https://github.com/Audiveris/audiveris/releases/download/5.10.2/Audiveris-5.10.2-ubuntu22.04-x86_64.deb
          sudo dpkg -i --force-all /tmp/audiveris.deb || true
          sudo apt-get install -f -y || true
          TESSDATA_DIR="$HOME/.config/AudiverisLtd/audiveris/config/tessdata"
          mkdir -p "$TESSDATA_DIR"
          curl -L -o "$TESSDATA_DIR/eng.traineddata" https://github.com/tesseract-ocr/tessdata_best/raw/main/eng.traineddata

      - name: Run Audiveris
        run: |
          mkdir -p results/carol-of-bells
          AUDIVERIS=$(find /opt -name "Audiveris" -type f 2>/dev/null | head -1)
          echo "Using: $AUDIVERIS"
          $AUDIVERIS -batch -export -output results/carol-of-bells -- test-scores/carol-of-the-bells-viola.pdf || true
          ls -la results/carol-of-bells/

      - name: Extract MusicXML
        run: python3 tools/hybrid/extract_mxl.py results/carol-of-bells

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: carol-of-bells-audiveris
          path: results/carol-of-bells/
          retention-days: 30
