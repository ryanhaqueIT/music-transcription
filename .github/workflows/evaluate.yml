name: Evaluate All Results

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HOMR OMR (CPU)", "oemer OMR (CPU)", "Audiveris OMR", "LLM Vision OMR"]
    types: [completed]

jobs:
  evaluate-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install music21 lxml

      - name: Run baseline evaluation on HOMR reference
        run: python evaluation/run_baseline.py

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-baseline
          path: evaluation/
          retention-days: 30
